; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

; FlipClock - Dual Board Project
; ESP32: Master controller with LCD, RTC, WiFi
; Uno: Stepper motor controller

; ==========================================
; ESP32 Environment
; ==========================================
[env:esp32]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
monitor_port = COM5
monitor_filters = time, colorize, esp32_exception_decoder, log2file
upload_port = COM5
upload_speed = 921600
board_build.partitions = huge_app.csv
board_build.f_flash = 40000000L
board_upload.maximum_size = 1966080
board_build.flash_mode = dio

; Use ESP32 source file
build_src_filter = 
    +<esp32_main.cpp>
    ; +<display_manager.cpp>
    -<uno_main.cpp>
    -<esp32_mainOLD.cpp>
    -<esp32_main_backup.cpp>
    -<spi_test.cpp>
    -<st7789_test.cpp>

; Build flags for SimpleST7789 driver
build_flags = 
    -w

lib_deps = 
    northernwidget/DS3231@^1.1.2
    earlephilhower/ESP8266Audio@^1.9.7
    https://github.com/pschatzmann/ESP32-A2DP.git
    https://github.com/pschatzmann/arduino-audiokit.git
    https://github.com/Links2004/arduinoWebSockets.git
    bblanchon/ArduinoJson@^6.21.0
    https://github.com/Bodmer/TJpg_Decoder.git
    adafruit/Adafruit GFX Library@^1.12.6
    https://github.com/adafruit/Adafruit_BusIO.git

; ==========================================
; ESP32 OTA Environment
; ==========================================
[env:esp32-ota]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_protocol = espota
upload_port = 192.168.1.123
board_build.partitions = default_16MB.csv   ; ← if you have 16MB flash
; OR use this for 4MB flash with larger app:
; board_build.partitions = min_spiffs.csv
board_build.f_flash = 40000000L
board_build.flash_mode = dio
monitor_filters = time, colorize, esp32_exception_decoder, log2file

build_src_filter =
    +<esp32_main.cpp>
    +<display_manager.cpp>
    -<uno_main.cpp>
    -<esp32_mainOLD.cpp>
    -<esp32_main_backup.cpp>
    -<spi_test.cpp>
    -<st7789_test.cpp>

build_flags =
    -w

lib_deps = 
    northernwidget/DS3231@^1.1.2
    earlephilhower/ESP8266Audio@^1.9.7
    https://github.com/pschatzmann/ESP32-A2DP.git
    https://github.com/pschatzmann/arduino-audiokit.git
    https://github.com/Links2004/arduinoWebSockets.git
    bblanchon/ArduinoJson@^6.21.0
    https://github.com/Bodmer/TJpg_Decoder.git

; ==========================================
; Arduino Uno Environment
; ==========================================
[env:uno]
platform = atmelavr
board = uno
framework = arduino
monitor_speed = 115200
upload_port = COM3
monitor_port = COM3
upload_speed = 57600

build_src_filter = 
    +<uno_main.cpp>
    -<esp32_main.cpp>
    -<esp32_mainOLD.cpp>
    -<esp32_main_backup.cpp>

lib_deps = 
    arduino-libraries/Stepper@^1.1.3
    northernwidget/DS3231@^1.1.2

; ==========================================
; ESP32 SPI Test (minimal)
; ==========================================
[env:esp32-spi-test]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
monitor_port = COM5
monitor_filters = time, colorize
upload_port = COM5

build_src_filter = 
    +<spi_test.cpp>
    -<esp32_main.cpp>
    -<uno_main.cpp>
    -<esp32_mainOLD.cpp>
    -<esp32_main_backup.cpp>
    -<st7789_test.cpp>

; ==========================================
; ESP32 ST7789 Raw Command Test
; ==========================================
[env:esp32-st7789-test]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
monitor_port = COM5
monitor_filters = time, colorize, esp32_exception_decoder
upload_port = COM5

build_src_filter = 
    +<st7789_test.cpp>
    -<esp32_main.cpp>
    -<uno_main.cpp>
    -<esp32_mainOLD.cpp>
    -<esp32_main_backup.cpp>
    -<spi_test.cpp>